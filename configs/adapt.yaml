seed: 42
preferred_cuda_index: 0
run_name: lam_pinn_adapt_single_case
checkpoint_path: outputs/train/solid_3cluster_adam/checkpoints
output_root: outputs/adapt

model:
  hidden_dim: 64
  dropout_p: 0.0
  gate_init: 0.5

sampling:
  num_domain_points: 10000
  num_bc_points: 500

task:
  case_index: 1
  eval_dir: data/eval
  eval_filename_pattern: sample_task{idx}.csv

optimization:
  epochs: 1000
  lr_model: 0.002
  lr_gate: 0.3
  bc_scale: 50.0
  scheduler_factor: 0.7
  scheduler_patience: 150
  freeze_basis: true
  print_every: 200
