seed: 42
preferred_cuda_index: 1
run_name: solid_3cluster_adam_from_lbfgs
train_csv_path: data/train/Solid_cluster_results__3cluster_100epoch_240708.csv
output_root: outputs/train
expected_num_clusters: 3
reference_row_index: 13
warm_start_checkpoint_path: /ABSOLUTE/PATH/TO/model_state_dict.pth

model:
  hidden_dim: 64
  dropout_p: 0.2
  gate_init: 0.5

sampling:
  num_domain_points: 10000
  num_bc_points: 500

optimization:
  forward_stage_epochs: 100
  backward_stage_epochs: 100
  lr_model: 0.002
  bc_scale: 50.0
  scheduler_factor: 0.7
  scheduler_patience: 150
  backward_scheduler_factor: 0.7
  backward_scheduler_patience: 50
